# Alembic config — schema migrations for agentcore's durable Postgres state.
#
# Production deploys: `alembic upgrade head` once on deploy.
# Dev convenience:    `init_schema()` calls in code still create tables on
#                     first use, so `agentcore plan ...` works without an
#                     explicit migrate step. Dev mode and migrations both use
#                     `CREATE TABLE IF NOT EXISTS`, so they don't conflict.

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = driver://user:pass@host/db   ; overridden in env.py from agentcore.settings

[post_write_hooks]
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = check --select I --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
